# nginx.conf — Load balancer for scaled webhook servers
# Used with: docker compose --profile scale up --scale webhook-server=3

events {
    worker_connections 1024;
}

http {
    upstream webhook_cluster {
        least_conn;
        server webhook-server:3000;
    }

    server {
        listen 80;

        # Health check passthrough
        location /health {
            proxy_pass http://webhook_cluster;
            proxy_set_header Host $host;
        }

        # Readiness check
        location /ready {
            proxy_pass http://webhook_cluster;
            proxy_set_header Host $host;
        }

        # Metrics endpoint
        location /metrics {
            proxy_pass http://webhook_cluster;
            proxy_set_header Host $host;
        }

        # Webhook endpoint
        location /webhook {
            proxy_pass http://webhook_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running webhook processing
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;

            # Buffer settings for large payloads
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
        }

        # Block everything else
        location / {
            return 404 '{"error":"not_found"}';
            add_header Content-Type application/json;
        }
    }
}
